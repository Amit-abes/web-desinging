!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f4f4;
            text-align:center;
        }

        .container{
            width:700px;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input{
            width:200px;
            padding:10px;
            margin:5px;
        }

        button{
            padding:10px 15px;
            cursor:pointer;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        table,th,td{
            border:1px solid black;
        }

        th,td{
            padding:10px;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Student Management System</h1>

<input type="text" id="name" placeholder="Student Name">

<input type="number" id="roll" placeholder="Roll Number">

<input type="number" id="marks" placeholder="Marks">

<br><br>

<button onclick="addStudent()">Add Student</button>

<table>

<thead>

<tr>

<th>Name</th>
<th>Roll No</th>
<th>Marks</th>
<th>Percentage</th>
<th>Result</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<script>

function addStudent(){

let name=document.getElementById("name").value;

let roll=document.getElementById("roll").value;

let marks=document.getElementById("marks").value;

if(name==="" || roll==="" || marks===""){

alert("Please fill all fields");

return;

}

let percentage=marks+"%";

let result;

if(marks>=40){

result="Pass";

}
else{

result="Fail";

}

let row=document.createElement("tr");

row.innerHTML=`

<td>${name}</td>

<td>${roll}</td>

<td>${marks}</td>

<td>${percentage}</td>

<td>${result}</td>

<td>
<button onclick="deleteStudent(this)">
Delete
</button>
</td>

`;

document.getElementById("studentTable").appendChild(row);

document.getElementById("name").value="";

document.getElementById("roll").value="";

document.getElementById("marks").value="";

}

function deleteStudent(button){

button.parentElement.parentElement.remove();

}

</script>

</body>
</html>
